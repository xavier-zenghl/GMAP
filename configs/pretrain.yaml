# VQ-VAE Pre-training Configuration
model:
  n_points: 8192
  scales:
    - n_centers: 512
      k_neighbors: 32
      embed_dim: 384
    - n_centers: 256
      k_neighbors: 8
      embed_dim: 384
    - n_centers: 64
      k_neighbors: 8
      embed_dim: 384
  transformer:
    depth: 6
    heads: 6
    dim: 384
    mlp_ratio: 4.0
    drop_rate: 0.0
  dvae:
    codebook_size: 8192
    codebook_dim: 256
    decay: 0.99
  mask_ratio: 0.6

training:
  epochs: 300
  batch_size: 32
  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 0.05
  scheduler:
    type: cosine
    warmup_epochs: 10
  num_workers: 8

data:
  dataset: shapenet55
  data_root: ./data/ShapeNet55
  n_points: 8192
